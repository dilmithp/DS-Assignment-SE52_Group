server.port=8080
spring.application.name=api-gateway

spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.enabled=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/healthcare/protocol/openid-connect/certs
# Needed for TokenRelay filter to work if acting as a client
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8180/realms/healthcare

spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=lb://patient-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/patients/**
spring.cloud.gateway.routes[0].filters[0]=TokenRelay=

spring.cloud.gateway.routes[1].id=doctor-service
spring.cloud.gateway.routes[1].uri=lb://doctor-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/doctors/**
spring.cloud.gateway.routes[1].filters[0]=TokenRelay=

spring.cloud.gateway.routes[2].id=appointment-service
spring.cloud.gateway.routes[2].uri=lb://appointment-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/appointments/**
spring.cloud.gateway.routes[2].filters[0]=TokenRelay=

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[3].filters[0]=TokenRelay=

spring.cloud.gateway.routes[4].id=telemedicine-service
spring.cloud.gateway.routes[4].uri=lb://telemedicine-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/telemedicine/**
spring.cloud.gateway.routes[4].filters[0]=TokenRelay=

spring.cloud.gateway.routes[5].id=ai-symptom-service
spring.cloud.gateway.routes[5].uri=lb://ai-symptom-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/symptom-check/**
spring.cloud.gateway.routes[5].filters[0]=TokenRelay=
