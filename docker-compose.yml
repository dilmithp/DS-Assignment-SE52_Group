version: '3.8'

services:
  consul:
    image: hashicorp/consul:1.17
    container_name: consul
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
    ports:
      - "8180:8080"
    command: "start-dev"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres-patient:
    image: postgres:16
    container_name: postgres-patient
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=patientdb
    ports:
      - "5432:5432"

  postgres-doctor:
    image: postgres:16
    container_name: postgres-doctor
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=doctordb
    ports:
      - "5433:5432"

  postgres-appointment:
    image: postgres:16
    container_name: postgres-appointment
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=appointmentdb
    ports:
      - "5434:5432"

  postgres-payment:
    image: postgres:16
    container_name: postgres-payment
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=paymentdb
    ports:
      - "5435:5432"

  # Spring Boot Microservices
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"
    depends_on:
      consul:
        condition: service_healthy

  patient-service:
    build: ./patient-service
    container_name: patient-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8081:8081"
    depends_on:
      consul:
        condition: service_healthy
      postgres-patient:
        condition: service_started

  doctor-service:
    build: ./doctor-service
    container_name: doctor-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8082:8082"
    depends_on:
      consul:
        condition: service_healthy
      postgres-doctor:
        condition: service_started

  appointment-service:
    build: ./appointment-service
    container_name: appointment-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8083:8083"
    depends_on:
      consul:
        condition: service_healthy
      postgres-appointment:
        condition: service_started

  payment-service:
    build: ./payment-service
    container_name: payment-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8084:8084"
    depends_on:
      consul:
        condition: service_healthy
      postgres-payment:
        condition: service_started
      kafka:
        condition: service_started

  notification-service:
    build: ./notification-service
    container_name: notification-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8085:8085"
    depends_on:
      consul:
        condition: service_healthy
      kafka:
        condition: service_started

  telemedicine-service:
    build: ./telemedicine-service
    container_name: telemedicine-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8086:8086"
    depends_on:
      consul:
        condition: service_healthy

  ai-symptom-service:
    build: ./ai-symptom-service
    container_name: ai-symptom-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8087:8087"
    depends_on:
      consul:
        condition: service_healthy

  consultation-orchestrator:
    build: ./consultation-orchestrator
    container_name: consultation-orchestrator
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8088:8088"
    depends_on:
      consul:
        condition: service_healthy
      kafka:
        condition: service_started
