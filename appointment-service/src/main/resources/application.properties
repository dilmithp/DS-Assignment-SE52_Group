server.port=8083
spring.application.name=appointment-service

spring.datasource.url=jdbc:postgresql://localhost:5434/appointmentdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update

spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.enabled=true

spring.cloud.openfeign.client.config.default.loggerLevel=full

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/healthcare/protocol/openid-connect/certs
