server:
  port: 8083
spring:
  application:
    name: appointment-service
  datasource:
    url: jdbc:postgresql://localhost:5434/appointmentdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        register: true
        health-check-path: /actuator/health
        health-check-interval: 10s
    openfeign:
      client:
        config:
          default:
            loggerLevel: full
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8180/realms/healthcare/protocol/openid-connect/certs
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
