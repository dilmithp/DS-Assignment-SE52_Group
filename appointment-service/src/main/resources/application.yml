server:
  port: 8081

spring:
  application:
    name: appointment-service
  datasource:
    url: jdbc:postgresql://localhost:5433/appointment_db
    username: layathma
    password: layathmapwd
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Security / OAuth2 properties via Keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/healthcare-realm

# Feign/Eureka configurations
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
